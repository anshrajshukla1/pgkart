# PGKart Application Configuration

spring.application.name=pgkart

# ============================================================
# DATABASE — PostgreSQL
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pgkart}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# FLYWAY DATABASE MIGRATIONS
# ============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# SERVER
# ============================================================
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never

# ============================================================
# JWT SECURITY
# ============================================================
spring.app.jwtSecret=${JWT_SECRET:PGKartSecureJWTSecretKey2024ChangeInProductionUseAtLeast256BitsLong!!}
spring.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
spring.ecom.app.jwtCookieName=pgkart-session

# ============================================================
# RAZORPAY PAYMENT GATEWAY
# ============================================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SsIO2rE99QnSS4}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rTqJQbhbumK3ddTReYGhSV0k}

# ============================================================
# CLOUDINARY IMAGE STORAGE
# ============================================================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:drzdoi3rp}
cloudinary.api.key=${CLOUDINARY_API_KEY:612685378592342}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:idAfeOk879g4TQzOuJl05TT_kLM}

# ============================================================
# EMAIL — Gmail SMTP
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:support.pgkart@gmail.com}
spring.mail.password=${MAIL_PASSWORD:kdquhulturlbagtb}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
pgkart.mail.from=${MAIL_FROM:support.pgkart@gmail.com}
pgkart.mail.from.name=PGKart

# ============================================================
# CORS
# ============================================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ============================================================
# INVENTORY
# ============================================================
pgkart.inventory.low-stock-threshold=${LOW_STOCK_THRESHOLD:5}

# ============================================================
# ACTUATOR (Railway health checks)
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# ============================================================
# LOGGING
# ============================================================
logging.level.com.pgkart=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# Disable H2 console entirely (not applicable but safe guard)
spring.h2.console.enabled=false
