<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #6366f1; color: #ffffff; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>Password Reset Request</h2>
    <p>We received a request to reset your password for your PGKart account.</p>
    <p>Click the button below to set a new password. This link is valid for 1 hour.</p>
    <a th:href="${resetLink}" class="btn">Reset Password</a>
    <p style="margin-top: 30px; font-size: 0.9em; color: #777;">If you did not request a password reset, please ignore this email.</p>
</div>
</body>
</html>
